apiVersion: apps/v1
kind: Deployment
metadata:
  name: roman-arabic-converter
  labels:
    app: roman-arabic-converter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roman-arabic-converter
  template:
    metadata:
      labels:
        app: roman-arabic-converter
    spec:
      containers:
      - name: web
        image: zrchen0425/roman-numeral-converter:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
      restartPolicy: Always
